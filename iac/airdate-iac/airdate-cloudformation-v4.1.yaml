  # ── v3.8 NEW: STEP FUNCTIONS — Scoop agent pipeline ─────────────────
  # Pulled directly from the live state machine on 2026-07-14. RoleArn
  # below is the real, pre-existing role (not created by this template).
  AirdateScoopAgentStateMachine:
    Type: AWS::StepFunctions::StateMachine
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      StateMachineName: airdate-scoop-agent
      StateMachineType: EXPRESS
      RoleArn: arn:aws:iam::775443380425:role/airdate-scoop-sfn-role
      DefinitionString: |
        {
          "Comment": "AirDate Scoop Agent — autonomous journalism pipeline",
          "StartAt": "ScrapeArticles",
          "States": {
            "ScrapeArticles": {
              "Type": "Task",
              "Resource": "arn:aws:lambda:us-east-1:775443380425:function:airdate-scoop-scraper",
              "ResultPath": "$",
              "Retry": [{"ErrorEquals": ["States.TaskFailed"], "IntervalSeconds": 10, "MaxAttempts": 2}],
              "Catch": [{"ErrorEquals": ["States.ALL"], "Next": "PipelineFailed", "ResultPath": "$.error"}],
              "Next": "AnyFreshArticles"
            },
            "AnyFreshArticles": {
              "Type": "Choice",
              "Choices": [{"Variable": "$.raw_articles[0]", "IsPresent": true, "Next": "RankArticles"}],
              "Default": "NoNewContent"
            },
            "RankArticles": {
              "Type": "Task",
              "Resource": "arn:aws:lambda:us-east-1:775443380425:function:airdate-scoop-ranker",
              "ResultPath": "$",
              "Next": "SynthesizeStories"
            },
            "SynthesizeStories": {
              "Type": "Map",
              "ItemsPath": "$.ranked_articles",
              "MaxConcurrency": 3,
              "ResultPath": "$.synthesized",
              "ItemSelector": {
                "headline.$": "$$.Map.Item.Value.headline",
                "summary.$": "$$.Map.Item.Value.summary",
                "domain.$": "$$.Map.Item.Value.domain",
                "url.$": "$$.Map.Item.Value.url",
                "published_at.$": "$$.Map.Item.Value.published_at",
                "story_hash.$": "$$.Map.Item.Value.story_hash"
              },
              "Iterator": {
                "StartAt": "SynthesizeOne",
                "States": {
                  "SynthesizeOne": {
                    "Type": "Task",
                    "Resource": "arn:aws:lambda:us-east-1:775443380425:function:airdate-scoop-synthesizer",
                    "ResultPath": "$",
                    "Retry": [{"ErrorEquals": ["States.TaskFailed"], "IntervalSeconds": 5, "MaxAttempts": 2}],
                    "Catch": [{"ErrorEquals": ["States.ALL"], "Next": "StoryDiscarded", "ResultPath": "$.error"}],
                    "Next": "ImageStory"
                  },
                  "ImageStory": {
                    "Type": "Task",
                    "Resource": "arn:aws:lambda:us-east-1:775443380425:function:airdate-scoop-imager",
                    "ResultPath": "$",
                    "Retry": [{"ErrorEquals": ["States.TaskFailed"], "IntervalSeconds": 3, "MaxAttempts": 1}],
                    "Catch": [{"ErrorEquals": ["States.ALL"], "Next": "PlagiarismCheck", "ResultPath": "$.image_error"}],
                    "Next": "PlagiarismCheck"
                  },
                  "PlagiarismCheck": {
                    "Type": "Task",
                    "Resource": "arn:aws:lambda:us-east-1:775443380425:function:airdate-scoop-plagiarism-gate",
                    "ResultPath": "$",
                    "Next": "DidPassGate"
                  },
                  "DidPassGate": {
                    "Type": "Choice",
                    "Choices": [{"Variable": "$.passes", "BooleanEquals": true, "Next": "CheckConfidence"}],
                    "Default": "StoryDiscarded"
                  },
                  "CheckConfidence": {
                    "Type": "Choice",
                    "Choices": [{"Variable": "$.confidence_score", "NumericGreaterThanEquals": 6, "Next": "StoryApproved"}],
                    "Default": "StoryDiscarded"
                  },
                  "StoryApproved": {"Type": "Pass", "End": true},
                  "StoryDiscarded": {"Type": "Pass", "Result": null, "End": true}
                }
              },
              "Next": "PublishApproved"
            },
            "PublishApproved": {
              "Type": "Task",
              "Resource": "arn:aws:lambda:us-east-1:775443380425:function:airdate-scoop-publisher",
              "InputPath": "$.synthesized",
              "End": true
            },
            "NoNewContent": {"Type": "Succeed", "Comment": "No new articles since last run"},
            "PipelineFailed": {"Type": "Fail", "Error": "ScoopPipelineError", "Cause": "Pipeline encountered an unrecoverable error"}
          }
        }
      Tags:
        - Key: Project
          Value: AirDate
        - Key: Feature
          Value: Scoop

