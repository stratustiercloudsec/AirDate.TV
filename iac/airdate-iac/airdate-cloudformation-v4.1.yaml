AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AirDate.TV v3.8 Infrastructure as Code
  Stratustier Innovation Labs | Account 775443380425
  Covers: DynamoDB, Lambda, API Gateway, CloudFront, Cognito,
          EventBridge, S3, GuardDuty, Security Hub, CloudTrail, WAF
  Disaster Recovery: RTO 4hr / RPO 1hr
  v3.7 changes: persona-engine role, notifications POST, comments IAM expanded,
          customInterests in preferences, notification type handlers
  v3.8 changes: added the 9 airdate-scoop-* Lambdas (agent pipeline), the
          airdate-scoop-agent Step Functions state machine + its 4-hour
          EventBridge trigger, and airdate-rag-orchestration /
          airdate-tmdb-proxy, pulled directly from the live account on
          2026-07-14. See the "IMPORT / DRIFT NOTES" block below before
          deploying -- these resources describe what's actually running,
          they are NOT yet CloudFormation-managed.

# ============================================================
# IMPORT / DRIFT NOTES (read before running `cloudformation deploy`)
# ============================================================
# 1. THESE RESOURCES ARE NOT STACK-MANAGED YET.
#    Adding a resource block to a template does not "adopt" an existing,
#    already-running AWS resource. If you run a normal deploy/update-stack
#    with this template, CloudFormation will try to CREATE new resources
#    with these exact names/ARNs and FAIL on "already exists" conflicts
#    (Lambda function names, the state machine name, the rule name are all
#    already taken by the real, live resources). To actually bring them
#    under CFN management, use a CloudFormation "Import" change set
#    (aws cloudformation create-change-set --change-set-type IMPORT) against
#    each resource. Until that's done, treat this file as an accurate,
#    version-controlled DESCRIPTION of the live infrastructure, not an
#    executable deploy script for these particular resources.
#
# 2. IAM ROLE DRIFT ALREADY PRESENT IN THIS TEMPLATE BEFORE v3.8.
#    The template already defines "AirdateScoopLambdaRole" with
#    RoleName: airdate-scoop-lambda-role-cfn -- but the REAL, currently
#    deployed airdate-scoop-* Lambdas (synthesizer, scraper, publisher,
#    plagiarism-gate, healthcheck, imager) all use a DIFFERENT, older role:
#    arn:aws:iam::775443380425:role/airdate-scoop-lambda-role (no "-cfn"
#    suffix). AirdateScoopLambdaRole as defined here has never actually been
#    attached to anything live. The new Lambda resources below reference the
#    REAL role by its literal ARN so this file matches reality, but the
#    "-cfn" role is effectively dead weight sitting in this template --
#    worth a follow-up decision: either delete AirdateScoopLambdaRole here,
#    or do a deliberate cutover of the real Lambdas onto it.
#
# 3. TWO DIFFERENT NewsAPI KEYS IN USE.
#    airdate-scoop-scraper's NEWS_API_KEY and the separate "airdate-scoop"
#    function's NEWS_API_KEY are different values. Either one is stale
#    (e.g. left over from a key rotation that didn't get propagated to both
#    functions) or they're intentionally on separate NewsAPI accounts/plans.
#    Worth confirming which is actually valid -- flagged as NewsApiKeyScraper
#    vs NewsApiKeyScoop parameters below rather than silently merged into one.
#
# 4. SECRETS ARE CURRENTLY PLAINTEXT LAMBDA ENVIRONMENT VARIABLES.
#    TMDB_API_KEY, PEXELS_API_KEY, TAVILY_API_KEY, GOOGLE_API_KEY,
#    GOOGLE_CSE_ID, and both NEWS_API_KEY values are live third-party API
#    keys sitting in plain Lambda env vars today. The Parameters below use
#    NoEcho (so they won't show in `describe-stacks` output or the console),
#    but their Default values below ARE the real live keys in plaintext --
#    if this file goes into source control as-is, those keys are exposed in
#    git history the moment it's committed. Recommended before committing:
#    strip the Default values here and instead pass them via
#    --parameter-overrides at deploy time, or better, switch these Lambdas
#    to read from SSM Parameter Store SecureString / Secrets Manager and
#    reference them here with a dynamic reference like
#    '{{resolve:ssm-secure:/airdate/scoop/tavily_api_key:1}}' instead of a
#    plain Lambda environment variable.
# ============================================================

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]

  AgentModel:
    Type: String
    Default: us.anthropic.claude-3-5-haiku-20241022-v1:0

  FromEmail:
    Type: String
    Default: noreply@airdate.tv

  CloudTrailBucket:
    Type: String
    Default: airdate-cloudtrail-logs

  # ── v3.8 NEW: third-party API keys (see drift note #4 above) ──────────
  # NoEcho hides these from `describe-stacks`/console output, but the
  # Default values below are the real live keys -- scrub before committing
  # this file to source control, or better, move these to SSM SecureString.
  TmdbApiKey:
    Type: String
    NoEcho: true
    Default: d80b629f69e7c5393047c32a865ed697

  PexelsApiKey:
    Type: String
    NoEcho: true
    Default: CnztLHPtpOzmHstS35gB1XzraV7FYnVpkdizlZGlHlQId411pwP0Oxx1

  TavilyApiKey:
    Type: String
    NoEcho: true
    Default: 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

  GoogleApiKey:
    Type: String
    NoEcho: true
    Default: AIzaSyBXDdkZbYwvK-23AcYW5B2uBBhPQN6LWs4

  GoogleCseId:
    Type: String
    NoEcho: true
    Default: f16ab709a7d104a1d

  # See drift note #3 -- these two are genuinely different live values today.
  NewsApiKeyScraper:
    Type: String
    NoEcho: true
    Default: b1ff8e187cb149ac92eac18fe032c740

  NewsApiKeyScoop:
    Type: String
    NoEcho: true
    Default: 40d3016d-44a9-41c9-8c4f-5309d12f1cd6

Resources:

  # ── DYNAMODB TABLES ──────────────────────────────────────

  AirdateUsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: airdate-users
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: AirDate

  AirdateNotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: airdate-notifications
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: created_at
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: AirDate

  AirdateCacheTable:
