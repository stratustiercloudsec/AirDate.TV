        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - AttributeName: cache_key
          AttributeType: S
        - AttributeName: content_type
          AttributeType: S
      KeySchema:
        - AttributeName: cache_key
          KeyType: HASH
        - AttributeName: content_type
          KeyType: RANGE
      Tags:
