                Resource: arn:aws:ssm:us-east-1:775443380425:parameter/airdate/*
              - Effect: Allow
                Action: [cloudwatch:PutMetricData]
                Resource: '*'
      Tags:
        - Key: Project
          Value: AirDate
      # NOTE (v3.8 drift check): the REAL airdate-rag-orchestration and
      # airdate-tmdb-proxy Lambdas both currently use a console-created role,
